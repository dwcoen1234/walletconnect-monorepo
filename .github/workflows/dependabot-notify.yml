name: Notify Dependabot Alerts to Slack

on:
  push:
    branches: ['**']
  workflow_dispatch:  # Allow manual triggering

# Add top-level permissions
permissions:
  security-events: read
  contents: read

jobs:
  check_dependabot_alerts:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Check for high/critical Dependabot alerts
        id: check
        run: |
          # Get repo path from GitHub context
          REPO="${GITHUB_REPOSITORY}"
          
          # Query for high and critical severity alerts using a fine-grained token
          echo "Fetching Dependabot alerts from GitHub API..."
          RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${REPO}/dependabot/alerts?state=open")
          
          # Debug: Check API response structure
          echo "API Response structure:"
          echo "$RESPONSE" | jq 'type'
          
          # Check if response is valid JSON array
          if ! echo "$RESPONSE" | jq -e 'if type=="array" then true elif type=="object" and has("message") then false else false end' > /dev/null; then
            echo "Error: Invalid response from GitHub API"
            echo "Response: $RESPONSE"
            echo "alert_count=0" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Filter alerts by severity
          ALERTS=$(echo "$RESPONSE" | jq '[.[] | select(has("security_advisory") and (.security_advisory.severity=="high" or .security_advisory.severity=="critical"))]')
          
          # Count the alerts
          COUNT=$(echo "$ALERTS" | jq 'length')
          
          # Format alerts for Slack message
          if [ "$COUNT" -gt 0 ]; then
            FORMATTED=$(echo "$ALERTS" | jq -r '.[] | "• *\(.security_advisory.severity)* severity: \(.security_advisory.summary) in \(.dependency.package.name) \(.dependency.manifest_path)"')
            echo "alert_count=$COUNT" >> $GITHUB_OUTPUT
            echo "formatted_alerts<<EOF" >> $GITHUB_OUTPUT
            echo "$FORMATTED" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "alert_count=0" >> $GITHUB_OUTPUT
          fi
      
      - name: Notify Slack
        if: steps.check.outputs.alert_count != '0'
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "⚠️ Dependabot Security Alerts",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ steps.check.outputs.alert_count }}* high/critical severity alerts found in *${{ github.repository }}*:"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ steps.check.outputs.formatted_alerts }}"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Triggered by: ${{ github.actor }} | <${{ github.server_url }}/${{ github.repository }}/security/dependabot|View all alerts>"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.DEPENDABOT_NOTIFY_SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK 
